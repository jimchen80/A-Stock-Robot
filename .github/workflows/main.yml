name: A-Stock-Auto-Robot

on:
  workflow_dispatch: 
  schedule:
    - cron: '40 1 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Runtime Env
      run: pip install akshare pandas openpyxl requests numpy

    - name: Run Analysis
      run: python stock_robot.py

    - name: Force Push Report
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # --- 核心改动：创建一个永远在变的小文件，强迫 Git 必须识别到差异 ---
        echo "Last Run: $(date -d "+8 hours" +'%Y-%m-%d %H:%M:%S')" > last_run.txt
        
        # 显式添加所有相关文件
        git add index.xlsx last_run.txt || true
        
        # 获取北京时间用于提交备注
        TIME_STAMP=$(date -d "+8 hours" +'%Y-%m-%d %H:%M:%S')
        
        # 强制提交，因为 last_run.txt 必变，所以此步骤绝不会被跳过
        git commit -m "📈 潜伏者报告更新 | $TIME_STAMP" 
        
        # 推送到主分支
        git push origin main
