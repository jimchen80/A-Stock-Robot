name: A-Stock-Auto-Robot

on:
  schedule:
    - cron: '40 1 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Critical Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install akshare pandas openpyxl requests

    - name: Run Robot
      run: python stock_robot.py

    - name: Commit and Push
      run: |
        git config --global user.name "Robot"
        git config --global user.email "robot@github.com"
        git add .
        git commit -m "Auto Update Report" || exit 0
        git push
