name: A-Stock-Auto-Robot

on:
  workflow_dispatch: 
  schedule:
    - cron: '40 1 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Runtime Env
      run: pip install akshare pandas openpyxl requests numpy

    - name: Run Analysis
      run: python stock_robot.py

    - name: Force Push Report
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 严格对齐文件名（小写）
        git add index.xlsx index.html || true
        
        # 即使 Excel 内容未变，通过 Commit 信息差异强制 Git 推送
        TIME_STAMP=$(date -d "+8 hours" +'%Y-%m-%d %H:%M:%S')
        git commit -m "📈 潜伏者报告更新 | $TIME_STAMP [skip ci]" || echo "No changes to commit"
        
        git push origin main
