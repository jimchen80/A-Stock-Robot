name: A-Stock-Auto-Robot

on:
  workflow_dispatch: 
  schedule:
    - cron: '30 1 * * 1-5'  # 09:30
    - cron: '40 3 * * 1-5'  # 11:40
    - cron: '10 5 * * 1-5'  # 13:10
    - cron: '10 7 * * 1-5'  # 15:10

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Libs
      run: pip install akshare pandas openpyxl numpy

    - name: Execute Robot
      run: |
        rm -f index.xlsx
        python stock_robot.py
        echo "$(date +'%Y-%m-%d %H:%M:%S')" > last_run.txt

    - name: Force Commit and Push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 强制添加，无视缓存
        git add -f index.xlsx last_run.txt
        
        STAMP=$(date -d "+8 hours" +'%H:%M:%S')
        git commit -m "📊 拦截器物理刷新 | $STAMP" || echo "No changes"
        git push origin main
