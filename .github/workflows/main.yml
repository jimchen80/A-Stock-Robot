name: A-Share Anti-Blocking Robot 11.0

on:
  schedule:
    - cron: '30 1 * * 1-5'
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas openpyxl requests  # 必须包含 openpyxl

      - name: Run Anti-Blocking Scraping Engine
        run: |
          rm -f index.xlsx
          python stock_robot.py  # 文件名必须完全匹配

      - name: Commit and Push Report
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "AlphaBot-11.0"
          if [ -f "index.xlsx" ]; then
            git add index.xlsx
            git commit -m "Auto-Update: Strategy 11.0 Report"
            git push
          else
            echo "Error: index.xlsx not found"
            exit 1
          fi
