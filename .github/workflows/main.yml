- name: Force Push Report
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # --- 核心改动：创建一个永远在变的小文件，强迫 Git 必须提交 ---
        echo "$(date +'%Y-%m-%d %H:%M:%S')" > last_run.txt
        
        git add index.xlsx last_run.txt || true
        
        # 强制提交，不加 || echo，确保我们能看到真实的提交动作
        TIME_STAMP=$(date -d "+8 hours" +'%Y-%m-%d %H:%M:%S')
        git commit -m "📈 潜伏者报告更新 | $TIME_STAMP" 
        
        git push origin main
