name: A-Stock-Auto-Robot
on:
  workflow_dispatch: 
  schedule:
    - cron: '30 1 * * 1-5' # 每天上午 9:30 自动运行
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install
      run: pip install -r requirements.txt
    - name: Run
      run: python stock_robot.py
    - name: Push
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add -A
        git commit -m "📊 实时报告更新 $(date)" || exit 0
        git push
