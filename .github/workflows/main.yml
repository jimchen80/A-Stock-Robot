name: A-Stock-Auto-Robot

on:
  workflow_dispatch: 
  schedule:
    - cron: '40 1 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Runtime Env
      run: pip install akshare pandas openpyxl requests numpy

    - name: Run Analysis
      run: |
        # 第一步：物理删除旧文件，防止 Git 误判没变化
        rm -f index.xlsx
        # 第二步：生成新文件
        python stock_robot.py

    - name: Force Push to Main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 强制将新生成的 index.xlsx 加入暂存区
        git add index.xlsx || true
        
        # 即使 Excel 内容一模一样，通过 Commit 备注里的动态秒数强制产生提交
        TS=$(date -d "+8 hours" +'%H:%M:%S')
        git commit -m "📊 潜伏者报告更新 | $TS" 
        
        # 强制推送到主分支
        git push origin main
