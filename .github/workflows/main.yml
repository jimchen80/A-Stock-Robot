name: A-Stock-Auto-Robot

on:
  workflow_dispatch: 
  schedule:
    - cron: '40 1 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Runtime Env
      run: pip install akshare pandas openpyxl numpy

    - name: Run Analysis
      run: |
        # 1. 物理删除历史遗留，确保环境纯净
        rm -f index.xlsx
        # 2. 运行脚本生成新报告
        python stock_robot.py
        # 3. 额外生成一个物理时间文件，强制触发 Git 变更
        echo "Last Run: $(date -d "+8 hours" +'%Y-%m-%d %H:%M:%S')" > last_run.txt

    - name: Force Push to Main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # --- 核心修复：强制添加所有相关文件，不允许 Git 自动忽略 ---
        git add -f index.xlsx last_run.txt || true
        
        TS=$(date -d "+8 hours" +'%H:%M:%S')
        # 只要推送，就强制 Commit，不管 Git 认为有没有变化
        git commit -m "📊 潜伏者报告更新 | $TS" || echo "No changes to commit"
        
        # 强制推送到主分支
        git push origin main
