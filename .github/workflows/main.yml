name: A-Stock-Auto-Robot

on:
  workflow_dispatch: 
  schedule:
    - cron: '40 1 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: pip install akshare pandas openpyxl requests numpy

    - name: Run Robot
      run: python stock_robot.py

    - name: Commit and Push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 核心改动：强制添加文件，并带上随机/时间后缀确保提交成功
        git add index.xlsx index.html || true
        
        # 生成一个包含当前北京时间的提交信息
        TIME=$(date -d "+8 hours" +'%Y-%m-%d %H:%M:%S')
        
        # 强制提交，即使文件看起来没变也通过备注区分
        git commit -m "🚀 自动更新报告 ($TIME)" || echo "No changes to commit"
        
        git push origin main
