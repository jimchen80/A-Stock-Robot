name: A-Stock-Auto-Robot

on:
  schedule:
    # 自动执行时间 (北京时间 9:40, 11:30, 14:00, 15:00)
    - cron: '40 1 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Robot
      run: python stock_robot.py

    - name: Commit and Push
      run: |
        git config --global user.name "Robot"
        git config --global user.email "robot@github.com"
        git add .
        git commit -m "Auto Update Report"
        git push
