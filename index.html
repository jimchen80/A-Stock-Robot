<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>首席策略 10.5 拦截终端</title>
    <style>
        body { font-family: 'PingFang SC',sans-serif; text-align: center; background: #1a1a1a; color: #fff; padding-top: 10vh; }
        .card { background: #2d2d2d; display: inline-block; padding: 40px; border-radius: 15px; }
        .btn { display: inline-block; margin-top: 25px; padding: 15px 35px; background: #e74c3c; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏹 首席策略 10.5</h1>
        <p>全 A 股“地毯式”启动拦截器</p>
        <a id="downloadBtn" href="index.xlsx" class="btn" onclick="updateLink()">📥 下载最新拦截报告</a>
        <p id="timer" style="color:#666; font-size:12px; margin-top:10px;"></p>
    </div>

    <script>
        function updateLink() {
            const btn = document.getElementById('downloadBtn');
            const timestamp = new Date().getTime();
            // 改变链接为 index.xlsx?t=123456789，浏览器会认为是新文件
            btn.href = 'index.xlsx?t=' + timestamp;
        }
        // 每秒刷新一下提示，让你知道现在的时间
        setInterval(() => {
            document.getElementById('timer').innerText = "当前系统时间：" + new Date().toLocaleString();
        }, 1000);
    </script>
</body>
</html>
